<!DOCTYPE html>
<head>
 <script>
  {const sParam="url"
  let sPageURL = window.location.href;
  if(sPageURL.indexOf(sParam) > -1){
   sPageURL = sPageURL.substring(sPageURL.indexOf(sParam)+sParam.length+1);
   if(sPageURL.indexOf('&') > -1){
    sPageURL = sPageURL.slice(0, sPageURL.indexOf('&'));
   }
   var base = document.createElement('base');
   base.href = sPageURL;
   base.target="_blank";
   document.head.appendChild(base);
  }}
  async function getFileAsElement(file, type, loc){
   const res = await fetch(file);
   const data = await res.text();
   if(type == 'style'){
    const style=document.createElement(type);
    style.textContent=data;
    document[loc].appendChild(style);
   }else {
    const script=document.createElement(type);
    script.text=data;
    document[loc].appendChild(script);
   }
  }
  {
   console.log(getFileAsElement);
   getFileAsElement("../css/global.css", 'style', 'head');
   getFileAsElement("../css/default.css", 'style', 'head');
   getFileAsElement("../js/game.js", 'script', 'body');
  }
 </script>
 <title>Boogoo</title>
</head>
<body>
<header>
 <p>Head</p>
</header>
<div id="newGame"class="screen">
 <h1>Boogoo</h1>
  <div class="row">
   <div>DARK MODE:</div>
   <div class="switchBody"onclick="toggleDarkMode()"tabindex=0>
    <div class="switchSelector switchOn"></div>
   </div>
  </div>
 <div onclick="goTo('gameReturn')"class="button">Down</div>
</div>
<div id="gameReturn"class="screen">
 <p>VERY RANDOM TEXT</p>
 <div onclick="goTo('newGame')"class="button">Up</div>
</div>
<footer>
 <p>Boogoo</p>
</footer>
</body>
</html>
